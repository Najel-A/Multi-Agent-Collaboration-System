apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: strimzi-kafka-operator
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: kafka
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
  chart:
    spec:
      chart: strimzi-kafka-operator
      sourceRef:
        kind: HelmRepository
        name: strimzi
        namespace: flux-system
      interval: 30m
  values:
    # Keep defaults unless you need to tune resources
    watchAnyNamespace: false
    watchNamespaces:
      - kafka
