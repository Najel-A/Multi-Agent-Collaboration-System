apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/Najel-A/Multi-Agent-Collaboration-System/
  ref:
    branch: ak-dev-pipeline
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 5m
  path: "./clusters/data-pipeline"
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: app-source
# flux reconcile kustomization production-sync -n flux-system --with-source