---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "84.5.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 10m

  install:
    crds: CreateReplace
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

  values:
    fullnameOverride: kps

    crds:
      enabled: true

    prometheusOperator:
      enabled: true

    prometheus:
      enabled: true
      service:
        type: ClusterIP
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - prometheus.monitoring.com
        paths:
          - /
        pathType: Prefix
      prometheusSpec:
        replicas: 1
        retention: 1d
        scrapeInterval: 30s
        evaluationInterval: 30s

        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false

        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi

        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi

    alertmanager:
      enabled: true
      service:
        type: ClusterIP
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - alertmanager.monitoring.com
        paths:
          - /
        pathType: Prefix
      alertmanagerSpec:
        replicas: 1
        storage:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi
        alertmanagerConfigSelector:
          matchLabels:
            alertmanagerConfig: "true"
        alertmanagerConfigNamespaceSelector:
          matchNames:
            - monitoring

    grafana:
      enabled: true

      persistence:
        enabled: true
        size: 10Gi

      sidecar:
        dashboards:
          enabled: true
        datasources:
          enabled: true

      envValueFrom:
        ELASTICSEARCH_PASSWORD:
          secretKeyRef:
            name: mas-elasticsearch-es-elastic-user
            key: elastic

      additionalDataSources:
        - name: Elasticsearch
          uid: elasticsearch
          type: elasticsearch
          access: proxy
          url: https://mas-elasticsearch-es-http.elasticsearch.svc.cluster.local:9200
          isDefault: false
          basicAuth: true
          basicAuthUser: elastic
          secureJsonData:
            basicAuthPassword: ${ELASTICSEARCH_PASSWORD}
          jsonData:
            index: filebeat-*
            timeField: "@timestamp"
            esVersion: "8.0.0"
            tlsSkipVerify: true
            logMessageField: message
            logLevelField: log.level

    kubeStateMetrics:
      enabled: true

    nodeExporter:
      enabled: true
      priorityClassName: system-node-critical

      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

    defaultRules:
      create: true

    kubeApiServer:
      enabled: true

    kubelet:
      enabled: true

    kubeControllerManager:
      enabled: true

    coreDns:
      enabled: true

    kubeEtcd:
      enabled: true

    kubeScheduler:
      enabled: true

    kubeProxy:
      enabled: true