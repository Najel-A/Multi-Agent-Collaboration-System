apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: test-app
  annotations:
    kustomize.toolkit.fluxcd.io/reconcile: disabled
data:
  wrong-key.yml: |
    global:
      scrape_interval: 15s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-prometheus
  namespace: test-app
  annotations:
    kustomize.toolkit.fluxcd.io/reconcile: disabled
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-prometheus
  template:
    metadata:
      labels:
        app: broken-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml