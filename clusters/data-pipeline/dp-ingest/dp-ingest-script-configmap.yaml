apiVersion: v1
kind: ConfigMap
metadata:
  name: ingest-jsonl-script
  namespace: dp-ingest
data:
  jsonl_to_parquet.py: |
    import argparse
    from pyspark.sql import SparkSession, functions as F

    def main():
        p = argparse.ArgumentParser()
        p.add_argument("--input", required=True, help="s3a://bucket/prefix/ with jsonl")
        p.add_argument("--output", required=True, help="s3a://bucket/prefix/ for parquet")
        args = p.parse_args()

        spark = SparkSession.builder.appName("ingest-jsonl-to-parquet").getOrCreate()
        spark.sparkContext.setLogLevel("WARN")

        # JSONL = one JSON object per line
        df = (spark.read
              .format("json")
              .option("multiLine", "false")
              .option("mode", "PERMISSIVE")
              .option("columnNameOfCorruptRecord", "_corrupt_record")
              .load(args.input))

        df = (df
              .withColumn("ingest_date", F.current_date())
              .withColumn("source_file", F.input_file_name()))

        # Keep corrupt records too (optional). If you want to drop them, filter them out.
        good = df.filter(F.col("_corrupt_record").isNull()).drop("_corrupt_record")
        bad  = df.filter(F.col("_corrupt_record").isNotNull())

        (good.write
             .mode("append")
             .partitionBy("ingest_date")
             .parquet(args.output.rstrip("/") + "/good"))

        # Save bad lines for debugging
        if not bad.rdd.isEmpty():
            (bad.write
                .mode("append")
                .partitionBy("ingest_date")
                .json(args.output.rstrip("/") + "/bad"))

        spark.stop()

    if __name__ == "__main__":
        main()