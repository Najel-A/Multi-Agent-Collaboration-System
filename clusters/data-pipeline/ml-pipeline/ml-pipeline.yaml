apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: auto-train-pipeline
  namespace: ml-pipelines
spec:
  type: Python
  mode: cluster
  sparkVersion: "3.5.1"
  image: spark:3.5.1-python3
  imagePullPolicy: IfNotPresent

  mainApplicationFile: local:///opt/spark/app/train_pipeline.py
  arguments:
    - "--raw"
    - "s3a://ml-data/raw/"
    - "--checkpoint"
    - "s3a://ml-data/checkpoints/train-pipeline/"
    - "--processed"
    - "s3a://ml-data/processed/"
    - "--format"
    - "csv"
    - "--trigger"
    - "2 minutes"

  deps:
    packages:
      - org.apache.hadoop:hadoop-aws:3.3.4
      - com.amazonaws:aws-java-sdk-bundle:1.12.262

  sparkConf:
    "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.endpoint": "http://minio.minio.svc.cluster.local:9000"
    "spark.hadoop.fs.s3a.path.style.access": "true"
    "spark.hadoop.fs.s3a.connection.ssl.enabled": "false"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "com.amazonaws.auth.EnvironmentVariableCredentialsProvider"
    "spark.jars.ivy": "/tmp/.ivy2"
    "spark.hadoop.fs.s3a.fast.upload": "true"
    "spark.hadoop.fs.s3a.connection.maximum": "200"

  restartPolicy:
    type: Always

  volumes:
    - name: app-script
      configMap:
        name: auto-train-script

  driver:
    cores: 1
    memory: "2g"
    serviceAccount: spark
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: minio-s3-creds
            key: AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: minio-s3-creds
            key: AWS_SECRET_ACCESS_KEY
    volumeMounts:
      - name: app-script
        mountPath: /opt/spark/app

  executor:
    instances: 2
    cores: 1
    memory: "2g"
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: minio-s3-creds
            key: AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: minio-s3-creds
            key: AWS_SECRET_ACCESS_KEY
    volumeMounts:
      - name: app-script
        mountPath: /opt/spark/app