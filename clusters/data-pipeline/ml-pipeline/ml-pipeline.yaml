apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: auto-train-pipeline
  namespace: ml-pipelines
spec:
  type: Python
  mode: cluster
  sparkVersion: "3.5.1"
  image: spark:python3
  imagePullPolicy: IfNotPresent

  mainApplicationFile: local:///opt/spark/work-dir/train_pipeline.py
  arguments:
    - "--raw"
    - "s3a://YOUR_BUCKET/raw/"
    - "--checkpoint"
    - "s3a://YOUR_BUCKET/checkpoints/train-pipeline/"
    - "--processed"
    - "s3a://YOUR_BUCKET/processed/"

  # Keep it up if driver dies/restarts
  restartPolicy:
    type: Always
    onFailureRetryInterval: 10
    onSubmissionFailureRetryInterval: 20
  # RestartPolicy valid types: Never/OnFailure/Always :contentReference[oaicite:1]{index=1}

  volumes:
    - name: app-script
      configMap:
        name: auto-train-script

  driver:
    cores: 1
    memory: "2g"
    serviceAccount: spark
    volumeMounts:
      - name: app-script
        mountPath: /opt/spark/work-dir
  executor:
    instances: 2
    cores: 1
    memory: "2g"
    volumeMounts:
      - name: app-script
        mountPath: /opt/spark/work-dir