apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: ml-pipelines
  # If you’re on EKS with IRSA later, add:
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::<acct>:role/<role-name>
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-driver-role
  namespace: ml-pipelines
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "events"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-driver-rb
  namespace: ml-pipelines
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: ml-pipelines
roleRef:
  kind: Role
  name: spark-driver-role
  apiGroup: rbac.authorization.k8s.io