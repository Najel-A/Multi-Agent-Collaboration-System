apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-mcp-fix-agent
  namespace: nexus-trace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-mcp-fix-agent
  namespace: nexus-trace
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - events
      - configmaps
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources:
      - pods
    verbs: ["delete"]

  - apiGroups: [""]
    resources:
      - configmaps
      - services
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch", "update", "patch"]

  - apiGroups: ["apps"]
    resources:
      - deployments/scale
      - statefulsets/scale
    verbs: ["get", "update", "patch"]

  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-mcp-fix-agent
  namespace: nexus-trace
subjects:
  - kind: ServiceAccount
    name: k8s-mcp-fix-agent
    namespace: nexus-trace
roleRef:
  kind: Role
  name: k8s-mcp-fix-agent
  apiGroup: rbac.authorization.k8s.io