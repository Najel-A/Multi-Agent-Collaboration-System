apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-mcp-fix-agent
  namespace: nexus-trace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-mcp-fix-agent-full
  namespace: test-app
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-mcp-fix-agent-full
  namespace: test-app
subjects:
  - kind: ServiceAccount
    name: k8s-mcp-fix-agent
    namespace: nexus-trace
roleRef:
  kind: Role
  name: k8s-mcp-fix-agent-full
  apiGroup: rbac.authorization.k8s.io