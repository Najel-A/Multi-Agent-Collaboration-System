apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-mcp-fix-agent
  namespace: nexus-trace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-mcp-fix-agent
  template:
    metadata:
      labels:
        app: k8s-mcp-fix-agent
    spec:
      serviceAccountName: k8s-mcp-fix-agent
      containers:
        - name: k8s-mcp
          image: ghcr.io/containers/kubernetes-mcp-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KUBERNETES_NAMESPACE
              value: nexus-trace
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-mcp-fix-agent
  namespace: nexus-trace
spec:
  selector:
    app: k8s-mcp-fix-agent
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP