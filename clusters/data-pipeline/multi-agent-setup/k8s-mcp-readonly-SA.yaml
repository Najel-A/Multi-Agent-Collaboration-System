apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-mcp-readonly
  namespace: nexus-trace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-mcp-readonly
  namespace: test-app
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "events", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-mcp-readonly
  namespace: test-app
subjects:
  - kind: ServiceAccount
    name: k8s-mcp-readonly
    namespace: nexus-trace
roleRef:
  kind: Role
  name: k8s-mcp-readonly
  apiGroup: rbac.authorization.k8s.io