apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-qwen
  namespace: nexus-trace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rca-qwen
  template:
    metadata:
      labels:
        app: rca-qwen
    spec:
      nodeSelector:
        gpu-node: "true"
      tolerations:
        - key: "gpu-node"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

      volumes:
        - name: hf-cache
          emptyDir:
            sizeLimit: 60Gi
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

      containers:
        - name: rca-qwen
          image: deveshs18/rca-lora-qwen:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000

          env:
            - name: HF_HOME
              value: /hf-cache

          volumeMounts:
            - name: hf-cache
              mountPath: /hf-cache
            - name: dshm
              mountPath: /dev/shm

          resources:
            requests:
              cpu: "1"
              memory: "12Gi"
              ephemeral-storage: "40Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: "14Gi"
              ephemeral-storage: "60Gi"
              nvidia.com/gpu: "1"

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: rca-qwen
  namespace: nexus-trace
spec:
  selector:
    app: rca-qwen
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP