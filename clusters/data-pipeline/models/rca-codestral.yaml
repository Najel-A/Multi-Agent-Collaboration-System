apiVersion: apps/v1
kind: Deployment
metadata:
  name: crca-codestral
  namespace: nexus-trace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rca-codestral
  template:
    metadata:
      labels:
        app: rca-codestral
    spec:
      nodeSelector:
        gpu-node-large: "true"

      tolerations:
        - key: "gpu-node-large"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

      volumes:
        - name: hf-cache
          emptyDir:
            sizeLimit: 120Gi
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi

      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: Always

          command:
            - python3
            - -m
            - vllm.entrypoints.openai.api_server

          args:
            - --model
            - mistralai/Codestral-22B-v0.1

            - --served-model-name
            - rca-codestral

            - --host
            - 0.0.0.0

            - --port
            - "8000"

            - --dtype
            - half

            - --quantization
            - awq

            - --gpu-memory-utilization
            - "0.95"

            - --max-model-len
            - "4096"

            - --max-num-seqs
            - "1"

            - --enforce-eager

          env:
            - name: HF_HOME
              value: /hf-cache
            - name: TRANSFORMERS_CACHE
              value: /hf-cache
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True

          ports:
            - name: http
              containerPort: 8000

          volumeMounts:
            - name: hf-cache
              mountPath: /hf-cache
            - name: dshm
              mountPath: /dev/shm

          resources:
            requests:
              cpu: "4"
              memory: "24Gi"
              ephemeral-storage: "80Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "6"
              memory: "32Gi"
              ephemeral-storage: "120Gi"
              nvidia.com/gpu: "1"

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 120

          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            failureThreshold: 10

          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 6

---
apiVersion: v1
kind: Service
metadata:
  name: codestral-22b
  namespace: nexus-trace
spec:
  selector:
    app: codestral-22b
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP