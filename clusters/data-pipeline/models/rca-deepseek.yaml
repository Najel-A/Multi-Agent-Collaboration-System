apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-deepseek
  namespace: nexus-trace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rca-deepseek
  template:
    metadata:
      labels:
        app: rca-deepseek
    spec:
      nodeSelector:
        gpu-node: "true"

      tolerations:
        - key: "gpu-node"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

      volumes:
        - name: hf-cache
          emptyDir:
            sizeLimit: 80Gi
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: Always

          command:
            - python3
            - -m
            - vllm.entrypoints.openai.api_server

          args:
            - --model
            - deepseek-ai/DeepSeek-R1-Distill-Qwen-7B

            - --served-model-name
            - rca-deepseek

            - --host
            - 0.0.0.0

            - --port
            - "8000"

            - --dtype
            - half

            - --quantization
            - bitsandbytes

            - --load-format
            - bitsandbytes

            - --gpu-memory-utilization
            - "0.92"

            - --max-model-len
            - "24576"

            - --max-num-seqs
            - "1"

            - --enable-auto-tool-choice

            - --tool-call-parser
            - hermes

            - --enforce-eager

          env:
            - name: HF_HOME
              value: /hf-cache
            - name: TRANSFORMERS_CACHE
              value: /hf-cache
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True

          ports:
            - name: http
              containerPort: 8000

          volumeMounts:
            - name: hf-cache
              mountPath: /hf-cache
            - name: dshm
              mountPath: /dev/shm

          resources:
            requests:
              cpu: "2"
              memory: "12Gi"
              ephemeral-storage: "40Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "3"
              memory: "14Gi"
              ephemeral-storage: "80Gi"
              nvidia.com/gpu: "1"

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 80

          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            failureThreshold: 10

          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 6

---
apiVersion: v1
kind: Service
metadata:
  name: rca-deepseek
  namespace: nexus-trace
spec:
  selector:
    app: rca-deepseek
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP