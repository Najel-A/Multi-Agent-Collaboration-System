apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-mistral
  namespace: nexus-trace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rca-mistral
  template:
    metadata:
      labels:
        app: rca-mistral
    spec:
      nodeSelector:
        gpu-node: "true"
      tolerations:
        - key: "gpu-node"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

      volumes:
        - name: hf-cache
          emptyDir:
            sizeLimit: 50Gi

      containers:
        - name: rca-mistral
          image: mrunalikatta/executor-mistral-24b:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: HF_HOME
              value: /hf-cache
            - name: MODEL_PROFILE
              value: mistral
          volumeMounts:
            - name: hf-cache
              mountPath: /hf-cache
          resources:
            requests:
              cpu: "2"
              memory: "20Gi"
              ephemeral-storage: "55Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "40Gi"
              ephemeral-storage: "70Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: rca-mistral
  namespace: nexus-trace
spec:
  selector:
    app: rca-mistral
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP