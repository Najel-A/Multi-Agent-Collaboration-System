apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: log-train-job
  namespace: ray
spec:
  clusterSelector:
    ray.io/cluster: ray-cluster
  entrypoint: "python /app/train.py"
  shutdownAfterJobFinishes: true
  runtimeEnvYAML: |
    pip:
      - numpy
      - pandas
      - pyarrow
      - s3fs
      - torch==2.2.2
      - transformers==4.41.2
      - datasets==2.19.2
      - evaluate==0.4.2
      - accelerate==0.31.0
      - scikit-learn==1.3.2
      - peft==0.11.1