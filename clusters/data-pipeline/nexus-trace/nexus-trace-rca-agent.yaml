apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-agent
  namespace: nexus-trace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rca-agent
  template:
    metadata:
      labels:
        app: rca-agent
    spec:
      containers:
        - name: rca-agent
          image: akasht29/rca-agent:1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LITELLM_BASE_URL
              value: "http://litellm.nexus-trace.svc.cluster.local:4000"
            - name: LITELLM_API_KEY
              value: "sk-change-this-master-key"
            - name: MODEL_NAME
              value: "qwen-tool"
            - name: READONLY_MCP_SERVER
              value: "k8s_mcp_readonly"
            - name: DEFAULT_NAMESPACE
              value: "test-app"
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rca-agent
  namespace: nexus-trace
spec:
  selector:
    app: rca-agent
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP