apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spark-operator
  namespace: spark-operator
spec:
  interval: 10m
  chart:
    spec:
      chart: spark-operator
      version: ">=2.0.0 <3.0.0"
      sourceRef:
        kind: HelmRepository
        name: spark-operator
        namespace: flux-system

  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace

  values:
    spark:
      jobNamespaces:
        - ml-pipelines
        - dp-clean
        - dp-ingest
        - dp-train
    webhook:
      enable: true
    metrics:
      enable: true

    
