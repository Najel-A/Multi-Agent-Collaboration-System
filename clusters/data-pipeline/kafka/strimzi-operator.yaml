apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: strimzi-kafka-operator
  namespace: kafka
spec:
  interval: 10m
  chart:
    spec:
      chart: strimzi-kafka-operator
      version: "0.48.0"
      sourceRef:
        kind: HelmRepository
        name: strimzi
        namespace: flux-system
  install:
    createNamespace: false
  values:
    watchAnyNamespace: true