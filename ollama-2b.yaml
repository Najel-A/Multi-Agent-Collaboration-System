apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-2b
  namespace: nexus-trace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-2b
  template:
    metadata:
      labels:
        app: ollama-2b
    spec:
      nodeSelector:
        gpu-node: "true"
      tolerations:
        - key: "gpu-node"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-2b
  namespace: nexus-trace
spec:
  selector:
    app: ollama-2b
  ports:
    - name: http
      port: 11434
      targetPort: http
  type: ClusterIP